<!doctype html>
<html lang="en">
  <head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <bw-navbar base-path="../"></bw-navbar>

    <main class="builder-page">
      <section class="container">
        <bw-progress current="1"></bw-progress>

        <div class="section-heading">
          <h1 id="designs-heading">Choose Your House Package</h1>

        <div class="row g-4" id="packages-container">

        </div>
      </section>

    <bw-footer base-path="../"></bw-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../components/progress.js"></script>
