<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Architect Generating... | BuildWise</title>
    <link rel="icon" type="image/png" href="../assets/logo/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
      body {
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        font-family: var(--font);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .analyzing-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
      }

      .ai-header {
        text-align: center;
        margin-bottom: 40px;
        animation: pulseFade 2s infinite alternate;
      }

      .ai-header h2 {
        font-weight: 700;
        color: var(--text);
        margin-top: 15px;
      }

      .ai-header .spinner-grow {
        width: 3rem;
        height: 3rem;
        color: var(--primary);
      }

      .ai-feed {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-bottom: 80px; /* space for scrolling */
      }

      /* Bubbles styles */
      .ai-bubble {
        background: var(--surface);
        border-radius: 16px;
        padding: 16px 20px;
        box-shadow: 0 10px 30px rgba(31, 122, 92, 0.08);
        border-left: 4px solid var(--primary);
        display: flex;
        gap: 16px;
        align-items: flex-start;
        opacity: 0;
        transform: translateY(20px);
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      .ai-bubble-icon {
        font-size: 20px;
        line-height: 1;
        margin-top: 2px;
      }

      .ai-bubble-content {
        flex: 1;
      }
      
      .ai-bubble-field {
        font-size: 11px;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.1em;
        color: var(--primary);
        margin-bottom: 4px;
      }

      .ai-bubble-text {
        font-size: 15px;
        line-height: 1.5;
        color: var(--text);
      }

      @keyframes slideUpFade {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulseFade {
        from { opacity: 0.7; }
        to { opacity: 1; }
      }
      
      /* Hidden config engine */
      #configFormMount {
        display: none !important;
      }
    </style>
  </head>
  <body>
    
    <div class="analyzing-container">
      <div class="ai-header" id="aiHeader">
        <div class="spinner-grow" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <h2>BuildWise AI Architect</h2>
        <p class="text-muted">Drafting your perfect home configuration...</p>
      </div>

      <div class="ai-feed" id="aiFeed">
        <!-- Bubbles injected here via JS -->
      </div>
    </div>

    <!-- The invisible form engine -->
    <div id="configFormMount"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Configure logic (ES module) -->
    <!-- This will automatically initialize the form in the hidden div and trigger the AI flow -->
    <script type="module" src="../scripts/configure/configure.js"></script>
  </body>
</html>
