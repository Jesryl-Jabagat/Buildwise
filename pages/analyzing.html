<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Architect Generating... | BuildWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
      body {
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: var(--font);
      }
      .ai-loader {
        text-align: center;
        max-width: 600px;
        width: 100%;
        padding: 2rem;
      }
      .spinner-grow {
        width: 4rem;
        height: 4rem;
        margin-bottom: 2rem;
        animation-duration: 1.5s;
        color: var(--primary);
      }
      .progress-text {
        font-size: 1.25rem;
        margin-bottom: 1rem;
        font-weight: 500;
        min-height: 30px;
        color: var(--text-muted);
      }
      .progress {
        height: 12px;
        background-color: var(--surface);
        border-radius: 6px;
        overflow: hidden;
        box-shadow: inset 0 1px 2px rgba(0,0,0,.1);
      }
      .progress-bar {
        background: var(--primary);
        width: 0%;
        transition: width 15s linear;
      }
      .h2-title {
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="ai-loader">
      <div class="spinner-grow" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <h2 class="h2-title">BuildWise AI Architect</h2>
      <div class="progress-text" id="statusText">Analyzing configuration...</div>
      <div class="progress">
        <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>

    <script>
      const statuses = [
        "Analyzing configuration...",
        "Evaluating site constraints and lot area...",
        "Generating exterior visuals...",
        "Rendering 3D model...",
        "Calculating material estimates...",
        "Optimizing budget allocation...",
        "Finalizing structural plan..."
      ];

      const statusText = document.getElementById('statusText');
      const progressBar = document.getElementById('progressBar');
      
      const params = new URLSearchParams(window.location.search);
      const typeKey = params.get('type') || 'loft';

      // Total time = 15 seconds
      const totalTime = 15000;
      const stepTime = totalTime / statuses.length;
      let currentStep = 0;

      // Start the smooth progress bar immediately
      setTimeout(() => {
        progressBar.style.width = '100%';
      }, 50);

      const interval = setInterval(() => {
        currentStep++;
        if (currentStep < statuses.length) {
          statusText.innerText = statuses[currentStep];
        } else {
          clearInterval(interval);
          statusText.innerText = "Complete! Redirecting...";
          setTimeout(() => {
            window.location.href = `result.html?type=${encodeURIComponent(typeKey)}`;
          }, 600);
        }
      }, stepTime);
    </script>
  </body>
</html>
