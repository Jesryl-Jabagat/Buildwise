<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customize Your Home | BuildWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <bw-navbar base-path="../"></bw-navbar>

    <main class="builder-page friendly-builder-page">
      <section class="container">
        <bw-progress current="2"></bw-progress>

        <div class="friendly-config">
          <aside class="home-summary-card">
            <a class="back-link" href="designs.html">Back</a>
            <span class="selected-pill" id="selectedPill">Selected Model</span>
            <h1 id="selectedTitle">Loft Style</h1>
            <p id="selectedDescription">Selected house model description.</p>
          </aside>

          <div id="configFormMount"></div>
        </div>
      </section>
    </main>

    <bw-footer base-path="../"></bw-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Web components -->
    <script src="../components/navbar.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../components/progress.js"></script>

    <!-- Configure logic (ES module) -->
    <script type="module" src="../scripts/configure/configure.js"></script>
  </body>
</html>
